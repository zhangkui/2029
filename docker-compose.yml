services:
  web:
    build: .
    ports:
      - "8080:80"
      - "9000:9000"
    volumes:
      - ./src:/var/www/html
      - ./data:/var/www/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    command: >
      bash -c "php /var/www/html/websocket.php &
      apache2-foreground"
